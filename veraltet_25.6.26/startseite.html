<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- To ensure proper rendering and touch zooming for all devices / Responsivität -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Cookwise - Startseite</title>
    
    <!-- Bootstrap 5 CSS einbinden für Struktur und Layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    

    <!-- Font Awesome 6 für Icons (Herz, Einkaufswagen, Uhr, Zahnrad, Lupe) einbinden -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Einbinden Ihrer lokalen Style-Datei (style.css) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVIGATIONSSLEISTE (Immer in einer Reihe fixiert dank flex-nowrap) -->

     <!-- weißer Hintergrund, unterer Rand, innere Abstände (das Padding), automatisch ganz oben am Bildschirm fixiert -->
    <nav class="navbar navbar-light bg-white border-bottom sticky-top py-2">
        <!--Flexbox-Container in voller Breite, der alle Elemente in einer Reihe zentriert hält und sie gleichmäßig auf die Ränder verteilt -->
      <div class="container-fluid px-3 d-flex flex-nowrap align-items-center justify-content-between">
    
        <!-- Klickbares Logo (Bild + Text), fettgedruckt, zentriert und vor Komprimierung geschützt -->
       <a class="navbar-brand d-flex align-items-center fw-bold text-dark m-0" href="#" style="letter-spacing: 0.5px; flex-shrink: 0; gap: 5px;">
    <img src="chef-2.png" alt="Logo" style="width: 26px; height: auto;">
    <span>Cookwise</span>
       </a>
    
       <!-- Suchleiste mit Lupe-Button -->
       <form class="d-flex mx-2 align-items-center" role="search" style="max-width: 750px; flex-grow: 1;">
        <div class="input-group input-group-sm flex-nowrap align-items-center">
          <input class="form-control bg-light border-end-0 rounded-start-pill ps-3" type="search" placeholder="Suche..." aria-label="Search" style="font-size: 13px; height: 32px;">
          <button class="btn btn-light border border-start-0 rounded-end-pill pe-3 text-secondary d-flex align-items-center justify-content-center" type="submit" style="height: 32px;">
             <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
       </form>
       
    <!-- Rechter Bereich der Navigationsleiste: Funktionssymbole, Link zur Anmeldung und Registrieren-Button -->
       <div class="d-flex align-items-center gap-2 nav-right-compact" style="flex-shrink: 0;">
        <a href="#" class="text-dark nav-custom-icon nav-icon-small" title="Favoriten"><i class="fa-regular fa-heart"></i></a>
        <a href="#" class="text-dark nav-custom-icon nav-icon-small" title="Einkaufswagen"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="#" class="text-dark nav-custom-icon nav-icon-small" title="KI-Kochplaner"><i class="fa-regular fa-clock"></i></a>
        <a href="#" class="text-dark nav-custom-icon nav-icon-small" title="Einstellungen"><i class="fa-solid fa-gear"></i></a>
      
        <span class="text-muted mx-1" style="font-size: 12px;">|</span>
      
        <a href="#" class="text-secondary fw-semibold text-decoration-none btn-login-text" style="font-size: 12px; padding: 0 4px;">Anmelden</a>
      
        <a href="#" class="btn btn-dark btn-sm rounded-4 fw-semibold btn-register-compact" style="background-color: #2c3e50; white-space: nowrap;">Registrieren</a>
       </div>

       </div>
    </nav>

    <!-- HAUPTINHALT DER SEITE (Rezept-Slider) -->
    <main class="content-container">
        <!-- Hauptüberschrift des Bereichs -->
        <h1 class="main-title">Rezepte</h1>
        
        <!-- Slider-Wrapper für die exakte Positionierung der seitlichen Pfeile -->
        <div class="slider-wrapper">
            <!-- DE: Linker runder Pfeil-Button (<) -->
            <button class="slider-btn btn-left"><i class="fa-solid fa-chevron-left"></i></button>
            
            <!-- Karten-Leiste (Scrollt horizontal, die Scrollbar selbst ist im CSS ausgeblendet) -->
            <div class="recipe-slider">
                
                <!-- Rezeptkarte 1 -->
                <div class="recipe-card">
                    <div class="recipe-img" style="background-image: url('https://www.themealdb.com/images/media/meals/1543774956.jpg');"></div>
                    <p class="recipe-name">Fruchtgebäck mit Frischkäse</p>
                </div>
                
                <!-- Rezeptkarte 2 -->
                <div class="recipe-card">
                    <div class="recipe-img" style="background-image: url('https://www.themealdb.com/images/media/meals/xxtsvx1511814083.jpg');"></div>
                    <p class="recipe-name">Kanadische Erbsensuppe</p>
                </div>
                
                <!-- Rezeptkarte 3 -->
                <div class="recipe-card">
                    <div class="recipe-img" style="background-color: #f0f0f0; background-image: url('https://www.themealdb.com/images/media/meals/hxcuj01762772827.jpg');"></div>
                    <p class="recipe-name">Norwegisches Kartoffelfladenbrot</p>
                </div>
                
                <!-- Rezeptkarte 4 -->
                <div class="recipe-card">
                    <div class="recipe-img" style="background-image: url('https://www.themealdb.com/images/media/meals/spswqs1511558697.jpg');"></div>
                    <p class="recipe-name">Britischer Fischauflauf</p>
                </div>
                
                <!-- Rezeptkarte 5 -->
                <div class="recipe-card">
                    <div class="recipe-img" style="background-image: url('https://www.themealdb.com/images/media/meals/urtwux1486983078.jpg');"></div>
                    <p class="recipe-name">Marokkanischer Kartoffelsalat</p>
                </div>
                <!-- Die Rezeptdaten stammen aus der TheMealDB-API (Testdaten für den Prototyp) -->
            </div>
            
            <!-- Rechter runder Pfeil-Button (>) -->
            <button class="slider-btn btn-right"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
    </main>

    <!-- Scrollen der Rezeptkarten -->
    <script>
       const slider = document.querySelector('.recipe-slider');
       const btnLeft = document.querySelector('.btn-left');
       const btnRight = document.querySelector('.btn-right');

       /* Klick auf den rechten Pfeil – zur nächsten Seite scrollen */
       btnRight.addEventListener('click', () => {
       slider.scrollBy({ left: 220, behavior: 'smooth' });
       });

       /* Klick auf den linken Pfeil – zur vorigen Seite scrollen */
       btnLeft.addEventListener('click', () => {
       slider.scrollBy({ left: -220, behavior: 'smooth' });
       });
    </script>

</body>
</html>
