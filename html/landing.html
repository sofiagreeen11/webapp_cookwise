<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- navbar container -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container-fluid custom-center-container">

            <!-- logo -->
            <a class="navbar-brand d-flex align-items-center fw-bold">
                <img src="../logo_chef.png" alt="Icon" width="35" class="main-logo"> CookWise
            </a>

            <!-- mbile view toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- navbar content-->
            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- input -->
                <form class="d-flex ms-lg-4 my-3 my-lg-0 me-auto" style="max-width: 320px; width: 100%;">
                    <div class="input-group">
                        <span
                            class="input-group-text search-custom border-custom text-secondary rounded-pill rounded-end-0"
                            id="search-addon">
                            <i class="bi bi-search search-icon"></i>
                        </span>
                        <input class="form-control search-custom text-light border-custom rounded-pill rounded-start-0"
                            type="search" aria-label="Search" aria-describedby="search-addon">
                    </div>
                </form>

                <!-- icons -->
                <ul class="navbar-nav d-flex align-items-lg-center gap-2">

                    <li class="nav-item"><a class="nav-link nav-link-icon" href="#"><i class="bi bi-heart"></i></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-icon position-relative" href="#">
                            <i class="bi bi-cart3"></i>
                        </a>
                    </li>

                    <li class="nav-item"><a class="nav-link nav-link-icon" href="#"><i class="bi bi-clock"></i></a>
                    </li>

                    <hr class="d-lg-none text-secondary my-2">

                    <li class="nav-item dropdown ms-lg-2">

                        <a class="nav-link p-0 dropdown-toggle" href="#" id="profileDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?&fit=crop&w=150&q=80"
                                alt="Account Profile" class="avatar-placeholder">
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><a class="dropdown-item" href="#">My Profile</a></li>
                            <li><a class="dropdown-item" href="#">Settings</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Log Out</a></li>
                        </ul>

                    </li>
                </ul>

            </div>

        </div>
    </nav>

    <!-- recipes container -->
    <main class="custom-center-container my-4">

        <!-- responsive layout container -->
        <div class="row responsive-recipe-row">

            <!-- recipe1 -->
            <div class="col-custom-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1582576163090-09d3b6f8a969?auto=format&fit=crop&w=500&q=80"
                        class="recipe-bg" alt="Linsen-Curry">
                    <div class="recipe-content">
                        <div class="recipe-title">Linsen-Curry</div>
                        <div class="recipe-meta">leicht, 45 min.</div>
                        <div class="smiley-group">
                            <i class="bi bi-emoji-smile-fill active"></i>
                            <i class="bi bi-emoji-neutral"></i>
                            <i class="bi bi-emoji-frown"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- recipe2 -->
            <div class="col-custom-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1677743540715-d4fe04852225?auto=format&fit=crop&w=500&q=80"
                        class="recipe-bg" alt="Crispy Panko Chicken">
                    <div class="recipe-content">
                        <div class="recipe-title">Crispy Panko</div>
                        <div class="recipe-meta">mittel, 45 min.</div>
                        <div class="smiley-group">
                            <i class="bi bi-emoji-smile"></i>
                            <i class="bi bi-emoji-neutral-fill active"></i>
                            <i class="bi bi-emoji-frown"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-custom-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1664741662725-bd131742b7b7?auto=format&fit=crop&w=500&q=80"
                        class="recipe-bg" alt="Bœuf Bourguignon">
                    <div class="recipe-content">
                        <div class="recipe-title">Bœuf Bourguignon</div>
                        <div class="recipe-meta">mittel, 60 min.</div>
                        <div class="smiley-group">
                            <i class="bi bi-emoji-smile"></i>
                            <i class="bi bi-emoji-neutral"></i>
                            <i class="bi bi-emoji-frown-fill active"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-custom-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1476718406336-bb5a9690ee2a?auto=format&fit=crop&w=500&q=80"
                        class="recipe-bg" alt="Kürbis-Suppe">
                    <div class="recipe-content">
                        <div class="recipe-title">Kürbis-Suppe</div>
                        <div class="recipe-meta">leicht, 30 min.</div>
                        <div class="smiley-group">
                            <i class="bi bi-emoji-smile-fill active"></i>
                            <i class="bi bi-emoji-neutral"></i>
                            <i class="bi bi-emoji-frown"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-custom-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=500&q=80"
                        class="recipe-bg" alt="Buddha Bowl">
                    <div class="recipe-content">
                        <div class="recipe-title">Buddha Bowl</div>
                        <div class="recipe-meta">leicht, 30 min.</div>
                        <div class="smiley-group">
                            <i class="bi bi-emoji-smile-fill active"></i>
                            <i class="bi bi-emoji-neutral"></i>
                            <i class="bi bi-emoji-frown"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-custom-grid">
                <div class="recipe-card">
                    <img src="https://images.unsplash.com/photo-1582878826629-29b7ad1cdc43?auto=format&fit=crop&w=500&q=80"
                        class="recipe-bg" alt="Phở (Rind)">
                    <div class="recipe-content">
                        <div class="recipe-title">Phở (Rind)</div>
                        <div class="recipe-meta">schwer, 120 min.</div>
                        <div class="smiley-group">
                            <i class="bi bi-emoji-smile"></i>
                            <i class="bi bi-emoji-neutral"></i>
                            <i class="bi bi-emoji-frown-fill active"></i>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
